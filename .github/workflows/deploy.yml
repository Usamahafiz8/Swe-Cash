name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Type-check & build ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Build API (TypeScript compile)
        run: pnpm --filter api run build

      - name: Build Admin (Next.js)
        run: pnpm --filter admin run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─── Job 2: Deploy to server ────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: 22
          script: |
            set -e

            echo "── Pulling latest code ──"
            cd /root/Swe-Cash
            git fetch origin main
            git reset --hard origin/main

            echo "── Rebuilding and restarting containers ──"
            docker compose up -d --build --remove-orphans

            echo "── Waiting for API to be healthy ──"
            for i in $(seq 1 15); do
              STATUS=$(docker compose ps --format json api 2>/dev/null | grep -o '"Health":"[^"]*"' | cut -d'"' -f4 || echo "unknown")
              echo "  attempt $i — status: $STATUS"
              if [ "$STATUS" = "healthy" ] || docker compose ps api | grep -q "Up"; then
                echo "  API is up"
                break
              fi
              sleep 3
            done

            echo "── Patching L2 referral commission to 10% ──"
            docker compose exec -T api node -e "
              process.chdir('/app');
              const { PrismaClient } = require('.prisma/client');
              const p = new PrismaClient();
              p.setting.upsert({
                where: { key: 'referral_commission_level_2' },
                update: { value: '0.10', updatedBy: 'deploy' },
                create: { key: 'referral_commission_level_2', value: '0.10', updatedBy: 'deploy' }
              }).then(() => { console.log('L2 commission set to 10%'); return p.\$disconnect(); }).catch(e => { console.error(e); process.exit(1); });
            " || echo "⚠ L2 patch skipped (non-fatal)"

            echo "── Removing dangling images ──"
            docker image prune -f || true

            echo "── Deployment complete ──"
            docker compose ps
